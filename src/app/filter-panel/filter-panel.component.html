<div class="card">
	<div class="card-body">
		<h5 class="card-title">Filtry</h5>

		<div class="mb-3 fw-bold">
				<div class="mb-3">
					<label for="searchTerm" class="form-label">Szukaj produktu</label>
					<input type="text" class="form-control" [(ngModel)]="filters.searchQuery" (ngModelChange)="updateFilters()" id="searchTerm" placeholder="Wpisz nazwę produktu">
				</div>
				<div class="mb-3">
					<label for="category" class="form-label">Kategoria</label>
					<select class="form-select" [(ngModel)]="filters.category" (ngModelChange)="updateFilters()" aria-label="Default select example">
						<option value="" selected>Wszystkie kategorie</option>
						<option [value]="category" *ngFor="let category of categories;">{{ category }}</option>
					</select>
				</div>
				<div class="mb-3">
					<label for="minPrice" class="form-label">Minimalna cena: {{ filters.minPrice }}zł</label>
					<input type="range" id="minPrice" [(ngModel)]="filters.minPrice" (ngModelChange)="updateFilters()" [value]="filters.minPrice" min="0" max="5000" step="100" class="form-range">					
				</div>
				<div class="mb-3">
					<label for="maxPrice" class="form-label">Maksymalna cena: {{ filters.maxPrice }}zł</label>
					<input type="range" id="maxPrice" [(ngModel)]="filters.maxPrice" (ngModelChange)="updateFilters()" [value]="filters.maxPrice" min="0" max="5000" step="100" class="form-range">
				</div>
		</div>
	</div>
</div>
